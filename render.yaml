services:
  # ── Main app: Express backend + built React frontend ─────────────────────────
  # The React app is built into web/dist and served as static files by Express.
  # This keeps everything on one URL so session cookies and /api calls just work.
  - type: web
    name: persfin-app
    runtime: node
    buildCommand: "cd web && npm ci --include=dev && npm run build && cd ../server && npm ci --include=dev && npm run build"
    startCommand: "node server/dist/index.js"
    plan: free
    envVars:
      - key: NODE_ENV
        value: production

      # MongoDB Atlas connection string — paste in Render dashboard
      - key: MONGO_URI
        sync: false

      # Auto-generated by Render
      - key: SESSION_SECRET
        generateValue: true

      # Set to the persfin-ml Render URL after the ML service deploys
      - key: ML_SERVICE_URL
        sync: false

      # Set to this service's Render URL (used in password-reset email links)
      - key: APP_URL
        sync: false

      # ── Email / SMTP ────────────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: EMAIL_FROM
        value: noreply@persfin.app
      # Paste your Gmail address and App Password in the Render dashboard
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

      # ── Plaid ───────────────────────────────────────────────────────────────
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox

  # ── Python ML service ─────────────────────────────────────────────────────────
  - type: web
    name: persfin-ml
    runtime: python
    rootDir: python-ml
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
